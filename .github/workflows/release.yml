name: Release

on:
  push:
    branches: [main]

# changesets/action 이 Version PR 브랜치를 push 하고 PR 을 열 수 있어야 함
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: version packages PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # publish 입력을 지정하지 않음 → Version PR 생성/갱신만, npm publish 없음.
      # version 커맨드를 오버라이드해 changeset version 뒤 plugin.json 을 sync.
      - name: Create Version Packages PR
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          title: "chore(release): Version Packages"
          commit: "chore(release): Version Packages (CHANGELOG + plugin.json sync)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Version PR 이 병합돼 main 버전이 오르면 v<version> 태그 + GitHub Release 생성 (멱등, npm 무관).
      # changeset 이 남아 있는 push(=Version PR 생성 단계)에서는 버전이 아직 안 올랐으므로 태그가 이미 있어 skip.
      - name: Tag + GitHub Release on version bump
        run: bun scripts/release-github.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
